<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copilot Feature Prompt Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-8">

<h1 class="text-2xl font-bold mb-6">Copilot Feature Prompt Generator</h1>

<!-- Workspace -->
<div class="mb-6">
<label class="font-semibold">Workspace</label>

<div class="flex gap-2 mt-1">

<select id="workspaceSelect"
class="border rounded p-2 w-full"></select>

<button id="createWorkspaceBtn"
class="bg-blue-600 text-white px-4 rounded">
New
</button>

</div>

<div id="workspaceDate" class="text-sm text-gray-500 mt-1"></div>
</div>

<!-- Progress -->
<div class="mb-6 p-4 bg-gray-50 rounded border">

<div class="flex justify-between mb-2">
<span class="font-semibold">Implementation Progress</span>
<span id="successRate" class="font-bold text-blue-600">0%</span>
</div>

<div class="w-full bg-gray-200 rounded h-3">
<div id="progressBar"
class="bg-blue-600 h-3 rounded"
style="width:0%"></div>
</div>

</div>

<!-- Usage -->
<div class="mb-6 p-4 bg-gray-50 rounded border">

<h2 class="font-semibold mb-3">Copilot Usage Tracker</h2>

<div class="grid grid-cols-3 gap-4">

<div>
<label class="text-sm">Before (%)</label>
<input id="usageBefore"
type="number"
class="w-full border rounded p-2">
</div>

<div>
<label class="text-sm">After (%)</label>
<input id="usageAfter"
type="number"
class="w-full border rounded p-2">
</div>

<div>
<label class="text-sm">Used (%)</label>
<input id="usageResult"
type="number"
class="w-full border rounded p-2 bg-gray-100"
readonly>
</div>

</div>

</div>

<!-- Context -->
<div class="mb-6">
<label class="font-semibold">Project Context</label>
<input id="context"
class="w-full border rounded p-2 mt-1">
</div>

<!-- Features -->
<div id="featuresContainer" class="space-y-6"></div>

<button id="addFeatureBtn"
class="bg-green-600 text-white px-4 py-2 rounded mb-6">
+ Add Feature
</button>

<!-- Constraints -->
<div class="mb-6">
<label class="font-semibold">Global Constraints</label>
<textarea id="constraints"
rows="4"
class="w-full border rounded p-2 mt-1"></textarea>
</div>

<button id="generateBtn"
class="bg-blue-600 text-white px-6 py-2 rounded">
Generate Copilot Prompt
</button>

<!-- Output -->
<div class="mt-6">
<label class="font-semibold">Generated Prompt</label>
<textarea id="output"
rows="14"
class="w-full border rounded p-3 mt-1 bg-gray-50"></textarea>
</div>

<!-- Checklist -->
<div class="mt-8">
<h2 class="text-xl font-bold mb-4">Feature Implementation Checklist</h2>
<div id="checklistContainer" class="space-y-4"></div>
</div>

</div>

<script>

/* ===============================
STORAGE KEYS
=============================== */

const WORKSPACES_KEY="copilot_workspaces"
const CURRENT_WORKSPACE_KEY="copilot_current_workspace"

/* ===============================
ELEMENTS
=============================== */

const workspaceSelect=document.getElementById("workspaceSelect")
const workspaceDate=document.getElementById("workspaceDate")
const createWorkspaceBtn=document.getElementById("createWorkspaceBtn")

const contextInput=document.getElementById("context")
const constraintsInput=document.getElementById("constraints")
const container=document.getElementById("featuresContainer")
const checklistContainer=document.getElementById("checklistContainer")

const usageBefore=document.getElementById("usageBefore")
const usageAfter=document.getElementById("usageAfter")
const usageResult=document.getElementById("usageResult")

/* ===============================
WORKSPACE SYSTEM
=============================== */

function getWorkspaces(){
return JSON.parse(localStorage.getItem(WORKSPACES_KEY)||"[]")
}

function saveWorkspaces(list){
localStorage.setItem(WORKSPACES_KEY,JSON.stringify(list))
}

function getWorkspaceDataKey(id){
return "workspace_data_"+id
}

function setCurrentWorkspace(id){
localStorage.setItem(CURRENT_WORKSPACE_KEY,id)
}

function getCurrentWorkspace(){
return localStorage.getItem(CURRENT_WORKSPACE_KEY)
}

function renderWorkspaceList(){

const list=getWorkspaces()

workspaceSelect.innerHTML=""

list.forEach(ws=>{

const option=document.createElement("option")

option.value=ws.id
option.innerText=ws.name

workspaceSelect.appendChild(option)

})

}

createWorkspaceBtn.onclick=()=>{

const name=prompt("Workspace name")

if(!name) return

const list=getWorkspaces()

const id=Date.now().toString()

const created=new Date().toISOString().split("T")[0]

list.push({
id,
name,
created
})

saveWorkspaces(list)

renderWorkspaceList()

workspaceSelect.value=id
setCurrentWorkspace(id)

resetWorkspace()

workspaceDate.innerText="Created: "+created

}

workspaceSelect.onchange=()=>{

const id=workspaceSelect.value

setCurrentWorkspace(id)

loadWorkspace()

}

/* ===============================
WORKSPACE DATA
=============================== */

function saveWorkspace(){

const id=getCurrentWorkspace()

if(!id) return

const features=[]

document.querySelectorAll(".featureBlock").forEach(block=>{

features.push({
name:block.querySelector(".featureName").value,
tasks:block.querySelector(".featureTasks").value
})

})

const data={
context:contextInput.value,
constraints:constraintsInput.value,
features,
usage:{
before:usageBefore.value,
after:usageAfter.value
},
checklist:getChecklistState(),
last_opened:new Date().toISOString().split("T")[0]
}

localStorage.setItem(
getWorkspaceDataKey(id),
JSON.stringify(data)
)

}

function loadWorkspace(){

const id=getCurrentWorkspace()

if(!id) return

const data=JSON.parse(
localStorage.getItem(getWorkspaceDataKey(id))||"{}"
)

container.innerHTML=""

contextInput.value=data.context||""
constraintsInput.value=data.constraints||""

usageBefore.value=data.usage?.before||""
usageAfter.value=data.usage?.after||""

const features=data.features||[]

if(features.length===0){
addFeature()
}else{
features.forEach(f=>addFeature(f.name,f.tasks))
}

renderChecklistFromData(data.checklist||{})

updateSuccessRate()

}

/* ===============================
FEATURES
=============================== */

function addFeature(name="",tasks=""){

const div=document.createElement("div")

div.className="featureBlock border rounded-lg p-4 bg-gray-50"

div.innerHTML=`

<div class="flex justify-between items-center">

<label class="font-semibold">Feature</label>

<button class="text-red-500 text-sm removeBtn">
Remove
</button>

</div>

<input
class="featureName w-full border p-2 rounded mt-1"
value="${name}">

<label class="font-semibold mt-3 block">Tasks</label>

<textarea
class="featureTasks w-full border p-2 rounded mt-1"
rows="4">${tasks}</textarea>

`

container.appendChild(div)

div.querySelector(".removeBtn").onclick=()=>{
div.remove()
saveWorkspace()
}

div.querySelector(".featureName").oninput=saveWorkspace
div.querySelector(".featureTasks").oninput=saveWorkspace

saveWorkspace()

}

document.getElementById("addFeatureBtn").onclick=addFeature

/* ===============================
USAGE
=============================== */

function calculateUsage(){

const before=parseFloat(usageBefore.value||0)
const after=parseFloat(usageAfter.value||0)

usageResult.value=Math.max(after-before,0)

saveWorkspace()

}

usageBefore.oninput=calculateUsage
usageAfter.oninput=calculateUsage

/* ===============================
CHECKLIST
=============================== */

function getChecklistState(){

const checks=document.querySelectorAll(".taskCheck")

const state={}

checks.forEach(c=>{
state[c.dataset.id]=c.checked
})

return state

}

function renderChecklist(feature,tasks){

const div=document.createElement("div")

div.className="border rounded p-4 bg-gray-50"

const taskList=tasks.split("\n")
.filter(t=>t.trim())

let html=`<div class="font-semibold mb-2">${feature}</div>`

taskList.forEach(task=>{

const id=feature+"_"+task

html+=`
<label class="flex items-center gap-2 mb-1">
<input type="checkbox"
class="taskCheck"
data-id="${id}">
<span>${task}</span>
</label>
`

})

div.innerHTML=html

checklistContainer.appendChild(div)

}

function renderChecklistFromData(state){

document.querySelectorAll(".taskCheck").forEach(cb=>{
if(state[cb.dataset.id]){
cb.checked=true
}
})

}

/* ===============================
PROMPT
=============================== */

function generatePrompt(){

checklistContainer.innerHTML=""

let prompt=`PROJECT CONTEXT
${contextInput.value}

`

document.querySelectorAll(".featureBlock").forEach(block=>{

const name=block.querySelector(".featureName").value
const tasks=block.querySelector(".featureTasks").value

prompt+=`FEATURE
${name}

GOAL
Improve and stabilize the ${name} module.

TASKS
${tasks}

`

renderChecklist(name,tasks)

})

prompt+=`IMPLEMENTATION RULES
- Analyze existing implementation
- Modify existing code
- Avoid unnecessary refactor
`

document.getElementById("output").value=prompt

updateSuccessRate()

saveWorkspace()

}

document.getElementById("generateBtn").onclick=generatePrompt

/* ===============================
PROGRESS
=============================== */

function updateSuccessRate(){

const checks=document.querySelectorAll(".taskCheck")

if(checks.length===0) return

let done=0

checks.forEach(c=>{
if(c.checked) done++
})

const rate=Math.round((done/checks.length)*100)

document.getElementById("successRate").innerText=rate+"%"
document.getElementById("progressBar").style.width=rate+"%"

}

/* ===============================
RESET
=============================== */

function resetWorkspace(){

container.innerHTML=""

contextInput.value=""
constraintsInput.value=""

usageBefore.value=""
usageAfter.value=""
usageResult.value=""

addFeature()

}

/* ===============================
INIT
=============================== */

function init(){

renderWorkspaceList()

const current=getCurrentWorkspace()

if(current){

workspaceSelect.value=current
loadWorkspace()

}

}

init()

</script>

</body>
</html>
