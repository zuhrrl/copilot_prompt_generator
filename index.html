<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copilot Feature Prompt Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-8">

<h1 class="text-2xl font-bold mb-6">Copilot Feature Prompt Generator</h1>

<!-- Project Context -->
<div class="mb-6">
<label class="font-semibold">Project Context</label>
<input id="context" class="w-full border rounded p-2 mt-1">
</div>

<!-- Features -->
<div id="featuresContainer" class="space-y-6"></div>

<button id="addFeatureBtn"
class="bg-green-600 text-white px-4 py-2 rounded mb-6">
+ Add Feature
</button>

<!-- Constraints -->
<div class="mb-6">
<label class="font-semibold">Global Constraints</label>
<textarea id="constraints" rows="4"
class="w-full border rounded p-2 mt-1"
placeholder="- Avoid redundant tables
- Follow repository pattern
- Reuse existing architecture"></textarea>
</div>

<button id="generateBtn"
class="bg-blue-600 text-white px-6 py-2 rounded">
Generate Copilot Prompt
</button>

<!-- Output -->
<div class="mt-6">
<label class="font-semibold">Generated Prompt</label>
<textarea id="output" rows="15"
class="w-full border rounded p-3 mt-1 bg-gray-50"></textarea>
</div>

</div>

<script>

const STORAGE_KEY = "copilotPromptGenerator"

const contextInput = document.getElementById("context")
const constraintsInput = document.getElementById("constraints")
const container = document.getElementById("featuresContainer")

document.getElementById("addFeatureBtn").onclick = addFeature
document.getElementById("generateBtn").onclick = generatePrompt

function saveState() {

const features = []

document.querySelectorAll(".featureBlock").forEach(block => {

features.push({
name: block.querySelector(".featureName").value,
tasks: block.querySelector(".featureTasks").value
})

})

const data = {
context: contextInput.value,
constraints: constraintsInput.value,
features
}

localStorage.setItem(STORAGE_KEY, JSON.stringify(data))

}

function loadState(){

const data = JSON.parse(localStorage.getItem(STORAGE_KEY))

if(!data){
contextInput.value = "Use INSTRUCTIONS.md as project context."
addFeature()
return
}

contextInput.value = data.context || ""
constraintsInput.value = data.constraints || ""

data.features.forEach(f => addFeature(f.name, f.tasks))

}

function addFeature(name = "", tasks = ""){

const div = document.createElement("div")

div.className = "featureBlock border rounded-lg p-4 bg-gray-50"

div.innerHTML = `
<div class="flex justify-between items-center">
<label class="font-semibold">Feature</label>
<button class="text-red-500 text-sm removeBtn">Remove</button>
</div>

<input class="featureName w-full border p-2 rounded mt-1"
placeholder="Example: Ministries"
value="${name}">

<label class="font-semibold mt-3 block">Tasks</label>

<textarea class="featureTasks w-full border p-2 rounded mt-1"
rows="4"
placeholder="- Fix CRUD validation
- Prevent duplicate titles
- Improve form UX">${tasks}</textarea>
`

container.appendChild(div)

div.querySelector(".removeBtn").onclick = () => {
div.remove()
saveState()
}

div.querySelector(".featureName").oninput = saveState
div.querySelector(".featureTasks").oninput = saveState

saveState()

}

function generatePrompt(){

const context = contextInput.value
const constraints = constraintsInput.value

const featureNames = document.querySelectorAll(".featureName")
const featureTasks = document.querySelectorAll(".featureTasks")

let prompt = `${context}\n\nFeatures and tasks:\n\n`

featureNames.forEach((feature, i)=>{

const name = feature.value.trim()
const tasks = featureTasks[i].value.trim()

if(name){

prompt += `Feature: ${name}\nTasks:\n${tasks}\n\n`

}

})

prompt += `Constraints:\n${constraints}\n\n`

prompt += `Instructions:
- Analyze existing implementation first
- Refactor only if necessary
- Follow existing architecture
- Avoid unnecessary explanations
`

document.getElementById("output").value = prompt

}

contextInput.oninput = saveState
constraintsInput.oninput = saveState

loadState()

</script>

</body>
</html>
