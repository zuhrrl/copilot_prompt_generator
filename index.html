<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copilot Feature Prompt Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-8">

<h1 class="text-2xl font-bold mb-6">Copilot Feature Prompt Generator</h1>

<!-- Progress -->
<div class="mb-6 p-4 bg-gray-50 rounded border">

<div class="flex justify-between mb-2">
<span class="font-semibold">Implementation Progress</span>
<span id="successRate" class="font-bold text-blue-600">0%</span>
</div>

<div class="w-full bg-gray-200 rounded h-3">
<div id="progressBar" class="bg-blue-600 h-3 rounded" style="width:0%"></div>
</div>

<button id="resetChecklist" class="mt-3 text-sm text-red-500">
Reset Progress
</button>

</div>

<!-- Copilot Usage Tracker -->
<div class="mb-6 p-4 bg-gray-50 rounded border">

<h2 class="font-semibold mb-3">Copilot Usage Tracker</h2>

<div class="grid grid-cols-3 gap-4">

<div>
<label class="text-sm">Before (%)</label>
<input id="usageBefore"
type="number"
class="w-full border rounded p-2"
placeholder="10">
</div>

<div>
<label class="text-sm">After (%)</label>
<input id="usageAfter"
type="number"
class="w-full border rounded p-2"
placeholder="11">
</div>

<div>
<label class="text-sm">Used (%)</label>
<input id="usageResult"
type="number"
class="w-full border rounded p-2 bg-gray-100"
readonly>
</div>

</div>

</div>

<!-- Project Context -->
<div class="mb-6">
<label class="font-semibold">Project Context</label>
<input id="context"
class="w-full border rounded p-2 mt-1">
</div>

<!-- Features -->
<div id="featuresContainer" class="space-y-6"></div>

<button id="addFeatureBtn"
class="bg-green-600 text-white px-4 py-2 rounded mb-6">
+ Add Feature
</button>

<!-- Constraints -->
<div class="mb-6">
<label class="font-semibold">Global Constraints</label>
<textarea id="constraints"
rows="4"
class="w-full border rounded p-2 mt-1"></textarea>
</div>

<button id="generateBtn"
class="bg-blue-600 text-white px-6 py-2 rounded">
Generate Copilot Prompt
</button>

<!-- Output -->
<div class="mt-6">
<label class="font-semibold">Generated Prompt</label>
<textarea id="output"
rows="14"
class="w-full border rounded p-3 mt-1 bg-gray-50"></textarea>
</div>

<!-- Checklist -->
<div class="mt-8">

<h2 class="text-xl font-bold mb-4">
Feature Implementation Checklist
</h2>

<div id="checklistContainer" class="space-y-4"></div>

</div>

</div>

<script>

const STORAGE_KEY="copilotPromptGenerator"
const CHECKLIST_KEY="copilotChecklistState"
const USAGE_KEY="copilotUsage"

const contextInput=document.getElementById("context")
const constraintsInput=document.getElementById("constraints")
const container=document.getElementById("featuresContainer")
const checklistContainer=document.getElementById("checklistContainer")

const usageBefore=document.getElementById("usageBefore")
const usageAfter=document.getElementById("usageAfter")
const usageResult=document.getElementById("usageResult")

document.getElementById("addFeatureBtn").onclick=addFeature
document.getElementById("generateBtn").onclick=generatePrompt

document.getElementById("resetChecklist").onclick=()=>{
localStorage.removeItem(CHECKLIST_KEY)
location.reload()
}

function calculateUsage(){

const before=parseFloat(usageBefore.value||0)
const after=parseFloat(usageAfter.value||0)

const used=after-before

usageResult.value=used>0?used:0

saveUsage()

}

usageBefore.oninput=calculateUsage
usageAfter.oninput=calculateUsage

function saveUsage(){

localStorage.setItem(USAGE_KEY,JSON.stringify({
before:usageBefore.value,
after:usageAfter.value
}))

}

function loadUsage(){

const data=JSON.parse(localStorage.getItem(USAGE_KEY)||"{}")

usageBefore.value=data.before||""
usageAfter.value=data.after||""

calculateUsage()

}

function getChecklistState(){
return JSON.parse(localStorage.getItem(CHECKLIST_KEY)||"{}")
}

function saveChecklistState(state){
localStorage.setItem(CHECKLIST_KEY,JSON.stringify(state))
}

function saveState(){

const features=[]

document.querySelectorAll(".featureBlock").forEach(block=>{

features.push({
name:block.querySelector(".featureName").value,
tasks:block.querySelector(".featureTasks").value
})

})

localStorage.setItem(STORAGE_KEY,JSON.stringify({
context:contextInput.value,
constraints:constraintsInput.value,
features
}))

}

function loadState(){

const data=JSON.parse(localStorage.getItem(STORAGE_KEY))

if(!data){

contextInput.value="Use INSTRUCTIONS.md as project context."
addFeature()
return

}

contextInput.value=data.context
constraintsInput.value=data.constraints

data.features.forEach(f=>addFeature(f.name,f.tasks))

}

function addFeature(name="",tasks=""){

const div=document.createElement("div")

div.className="featureBlock border rounded-lg p-4 bg-gray-50"

div.innerHTML=`

<div class="flex justify-between items-center">

<label class="font-semibold">Feature</label>

<button class="text-red-500 text-sm removeBtn">
Remove
</button>

</div>

<input
class="featureName w-full border p-2 rounded mt-1"
placeholder="Example: Ministries"
value="${name}">

<label class="font-semibold mt-3 block">
Tasks
</label>

<textarea
class="featureTasks w-full border p-2 rounded mt-1"
rows="4"
placeholder="- Fix CRUD validation
- Prevent duplicate titles
- Improve form UX">${tasks}</textarea>

`

container.appendChild(div)

div.querySelector(".removeBtn").onclick=()=>{
div.remove()
saveState()
}

div.querySelector(".featureName").oninput=saveState
div.querySelector(".featureTasks").oninput=saveState

saveState()

}

function generatePrompt(){

const context=contextInput.value.trim()
const constraints=constraintsInput.value.trim()

const featureNames=document.querySelectorAll(".featureName")
const featureTasks=document.querySelectorAll(".featureTasks")

let prompt=`PROJECT CONTEXT
${context}

`

checklistContainer.innerHTML=""

featureNames.forEach((feature,i)=>{

const name=feature.value.trim()
const tasks=featureTasks[i].value.trim()

if(!name) return

prompt+=`FEATURE
${name}

GOAL
Improve and stabilize the ${name} module.

TASKS
${tasks}

`

renderChecklist(name,tasks)

})

prompt+=`CONSTRAINTS
${constraints}

IMPLEMENTATION RULES
- Analyze existing implementation before coding
- Modify existing code instead of rewriting
- Follow the current architecture
- Avoid unnecessary refactors
- Keep implementation simple and maintainable

EXPECTED OUTPUT
- Updated or new code integrated with the current project
`

document.getElementById("output").value=prompt

updateSuccessRate()

}

function renderChecklist(feature,tasks){

const div=document.createElement("div")

div.className="border rounded p-4 bg-gray-50"

const taskList=tasks.split("\n")
.filter(t=>t.trim())
.map(t=>t.replace("-","").trim())

let html=`<div class="font-semibold mb-2">${feature}</div>`

taskList.forEach(task=>{

const id=feature+"_"+task

html+=`
<label class="flex items-center gap-2 mb-1">

<input type="checkbox"
class="taskCheck"
data-id="${id}">

<span>${task}</span>

</label>
`

})

div.innerHTML=html

checklistContainer.appendChild(div)

const state=getChecklistState()

div.querySelectorAll(".taskCheck").forEach(cb=>{

const id=cb.dataset.id

if(state[id]){
cb.checked=true
}

cb.onchange=()=>{

const state=getChecklistState()
state[id]=cb.checked

saveChecklistState(state)

updateSuccessRate()

}

})

}

function updateSuccessRate(){

const checks=document.querySelectorAll(".taskCheck")

if(checks.length===0){
document.getElementById("successRate").innerText="0%"
document.getElementById("progressBar").style.width="0%"
return
}

let done=0

checks.forEach(c=>{
if(c.checked) done++
})

const rate=Math.round((done/checks.length)*100)

document.getElementById("successRate").innerText=rate+"%"
document.getElementById("progressBar").style.width=rate+"%"

}

contextInput.oninput=saveState
constraintsInput.oninput=saveState

loadState()
loadUsage()

</script>

</body>
</html>
